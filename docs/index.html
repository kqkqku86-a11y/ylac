<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLAC</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: sans-serif;
    background: #f0f0f0;
    color: #222;
    font-size: 15px;
}

header {
    background: #fff;
    border-bottom: 1px solid #ddd;
    padding: 12px 20px;
}

header h1 {
    font-size: 1.2rem;
    font-weight: bold;
}

header p {
    color: #777;
    font-size: 0.8rem;
    margin-top: 2px;
}

.container {
    max-width: 680px;
    margin: 0 auto;
    padding: 14px 16px;
}

#search {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid #ccc;
    border-radius: 3px;
    font-size: 14px;
    margin-bottom: 12px;
    background: #fff;
    color: #222;
}

#search:focus {
    outline: none;
    border-color: #888;
}

/* Card */
.song {
    position: relative;
    overflow: hidden;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 11px 13px;
    margin-bottom: 9px;
}

/* Video background */
.song .bg-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 0;
    pointer-events: none;
}

.song.playing .bg-video {
    opacity: 0.18;
}

/* Content above video */
.song-body {
    position: relative;
    z-index: 1;
}

.song-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 5px;
}

.song-id {
    font-size: 0.75rem;
    color: #999;
    white-space: nowrap;
    flex-shrink: 0;
}

.song h2 {
    font-size: 0.92rem;
    font-weight: bold;
    word-break: break-word;
    line-height: 1.3;
}

.meta {
    color: #666;
    font-size: 0.78rem;
    margin-bottom: 7px;
    line-height: 1.7;
}

audio {
    width: 100%;
    height: 30px;
    display: block;
    margin-top: 4px;
}

.download {
    display: inline-block;
    margin-top: 7px;
    padding: 4px 11px;
    background: #444;
    color: #fff;
    text-decoration: none;
    border-radius: 3px;
    font-size: 0.78rem;
}

.download:hover {
    background: #666;
}

#status {
    text-align: center;
    color: #888;
    padding: 20px;
    font-size: 0.9rem;
}

footer {
    text-align: center;
    padding: 18px;
    color: #aaa;
    font-size: 0.78rem;
    border-top: 1px solid #ddd;
    margin-top: 6px;
}
</style>
</head>

<body>

<header>
    <h1>YLAC</h1>
    <p>Young Ledger Line Audio Collection Share Storage</p>
</header>

<div class="container">

    <input
        id="search"
        type="text"
        placeholder="Search by title, artist, album, genre..."
    >

    <div id="status">Loading songs...</div>
    <div id="songs"></div>

</div>

<footer>
    Powered by GitHub Pages &mdash; YLAC
</footer>

<script>
let allSongs = [];

function titleFromFile(fileUrl) {
    try {
        const parts = decodeURIComponent(fileUrl).split('/');
        return parts[parts.length - 1].replace(/\.[^.]+$/, '');
    } catch (e) {
        return fileUrl;
    }
}

function formatDuration(seconds) {
    seconds = parseInt(seconds);
    if (isNaN(seconds)) return 'Unknown';
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return mins + ':' + String(secs).padStart(2, '0');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = String(text);
    return div.innerHTML;
}

async function loadSongs() {
    const status = document.getElementById('status');
    try {
        const res = await fetch('songs.json');
        if (!res.ok) throw new Error('Failed to load songs.json');
        allSongs = await res.json();
        status.style.display = 'none';
        renderSongs(allSongs);
    } catch (e) {
        status.textContent = 'Failed to load song list.';
        console.error(e);
    }
}

function renderSongs(list) {
    const container = document.getElementById('songs');
    container.innerHTML = '';

    if (list.length === 0) {
        container.innerHTML = '<div class="song"><div class="song-body">No songs found.</div></div>';
        return;
    }

    list.forEach(song => {
        const title = (song.title && song.title !== 'Unknown Title')
            ? song.title
            : titleFromFile(song.file);

        const card = document.createElement('div');
        card.className = 'song';

        // Video background (jika ada)
        const videoBg = song.video
            ? `<video class="bg-video" src="${escapeHtml(song.video)}" muted loop playsinline></video>`
            : '';

        card.innerHTML = `
            ${videoBg}
            <div class="song-body">
                <div class="song-header">
                    <span class="song-id">#${escapeHtml(song.id ?? '')}</span>
                    <h2>${escapeHtml(title)}</h2>
                </div>
                <div class="meta">
                    Artist: ${escapeHtml(song.artist || 'Unknown')}<br>
                    Album: ${escapeHtml(song.album || 'Unknown')}<br>
                    Genre: ${escapeHtml(song.genre || 'Unknown')}<br>
                    Duration: ${formatDuration(song.duration)}
                </div>
                <audio controls preload="none" controlsList="nodownload" oncontextmenu="return false;">
                    <source src="${escapeHtml(song.file)}">
                </audio>
                <a class="download" href="${escapeHtml(song.file)}" download>Download</a>
            </div>
        `;

        // Sinkronisasi video BG dengan audio
        const audio = card.querySelector('audio');
        const video = card.querySelector('.bg-video');

        if (audio && video) {
            audio.addEventListener('play',  () => { card.classList.add('playing');    video.play();  });
            audio.addEventListener('pause', () => { card.classList.remove('playing'); video.pause(); });
            audio.addEventListener('ended', () => { card.classList.remove('playing'); video.pause(); video.currentTime = 0; });
        }

        container.appendChild(card);
    });
}

document.getElementById('search').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    const filtered = allSongs.filter(song => {
        const title = (song.title && song.title !== 'Unknown Title')
            ? song.title : titleFromFile(song.file);
        return (
            title.toLowerCase().includes(q) ||
            (song.artist || '').toLowerCase().includes(q) ||
            (song.album  || '').toLowerCase().includes(q) ||
            (song.genre  || '').toLowerCase().includes(q) ||
            String(song.id || '').includes(q)
        );
    });
    renderSongs(filtered);
});

loadSongs();
</script>

</body>
</html>
