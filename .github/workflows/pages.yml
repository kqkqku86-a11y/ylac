name: Build and Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'songs/**'
      - 'metadata/**'
      - 'docs/**'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt update && sudo apt install -y jq

      - name: Generate songs.json from metadata
        run: |
          mkdir -p docs

          echo "[" > docs/songs.json
          FIRST=true

          while IFS= read -r meta; do
            [ -f "$meta" ] || continue

            # Ambil path file asli dari dalam metadata (sudah termasuk subdirektori)
            FILE_PATH=$(jq -r '.format.filename' "$meta")

            # Fallback title: pakai tag jika ada, jika tidak pakai nama file tanpa ekstensi
            TITLE=$(jq -r '
              if (.format.tags.title // "") != "" then
                .format.tags.title
              else
                (.format.filename | split("/") | last | gsub("\\.[^.]+$"; ""))
              end
            ' "$meta")

            ARTIST=$(jq -r '.format.tags.artist // "Unknown Artist"' "$meta")
            ALBUM=$(jq -r '.format.tags.album // "Unknown Album"' "$meta")
            DURATION=$(jq -r '.format.duration // 0' "$meta")

            URL="https://raw.githubusercontent.com/${{ github.repository }}/main/${FILE_PATH}"

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> docs/songs.json
            fi

            jq -n \
              --arg title    "$TITLE" \
              --arg artist   "$ARTIST" \
              --arg album    "$ALBUM" \
              --arg duration "$DURATION" \
              --arg file     "$URL" \
              '{title:$title, artist:$artist, album:$album, duration:$duration, file:$file}' \
              >> docs/songs.json

          done < <(find metadata -name "*.json" -type f | sort)

          echo "]" >> docs/songs.json
          echo "Generated songs.json:"
          cat docs/songs.json

      - name: Commit updated songs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/songs.json

          if ! git diff --cached --quiet; then
            git commit -m "Auto update songs.json"
            git push
          else
            echo "No changes."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build

    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
