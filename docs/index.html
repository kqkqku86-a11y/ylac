<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLAC</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: sans-serif;
    background: #f5f5f5;
    color: #222;
    font-size: 15px;
}

header {
    background: #fff;
    border-bottom: 1px solid #ddd;
    padding: 14px 20px;
}

header h1 {
    font-size: 1.3rem;
    font-weight: bold;
}

header p {
    color: #666;
    font-size: 0.85rem;
    margin-top: 2px;
}

.container {
    max-width: 700px;
    margin: 0 auto;
    padding: 16px;
}

#search {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 14px;
    margin-bottom: 14px;
    background: #fff;
    color: #222;
}

#search:focus {
    outline: none;
    border-color: #888;
}

.song {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 12px 14px;
    margin-bottom: 10px;
}

.song h2 {
    font-size: 0.95rem;
    font-weight: bold;
    margin-bottom: 6px;
    word-break: break-word;
}

.meta {
    color: #666;
    font-size: 0.8rem;
    margin-bottom: 8px;
    line-height: 1.6;
}

audio {
    width: 100%;
    height: 32px;
    margin-top: 6px;
    display: block;
}

.download {
    display: inline-block;
    margin-top: 8px;
    padding: 5px 12px;
    background: #333;
    color: #fff;
    text-decoration: none;
    border-radius: 3px;
    font-size: 0.8rem;
}

.download:hover {
    background: #555;
}

#status {
    text-align: center;
    color: #888;
    padding: 20px;
    font-size: 0.9rem;
}

footer {
    text-align: center;
    padding: 20px;
    color: #aaa;
    font-size: 0.8rem;
    border-top: 1px solid #ddd;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <h1>YLAC</h1>
    <p>Young Ledger Line Audio Collection Share Storage</p>
</header>

<div class="container">

    <input
        id="search"
        type="text"
        placeholder="Search by title, artist, album..."
    >

    <div id="status">Loading songs...</div>

    <div id="songs"></div>

</div>

<footer>
    Powered by GitHub Pages &mdash; YLAC
</footer>

<script>
let allSongs = [];

function titleFromFile(fileUrl) {
    try {
        const parts = decodeURIComponent(fileUrl).split('/');
        const filename = parts[parts.length - 1];
        return filename.replace(/\.[^.]+$/, '');
    } catch (e) {
        return fileUrl;
    }
}

async function loadSongs() {
    const status = document.getElementById('status');
    try {
        const response = await fetch('songs.json');
        if (!response.ok) throw new Error('Failed to load songs.json');
        allSongs = await response.json();
        status.style.display = 'none';
        renderSongs(allSongs);
    } catch (e) {
        status.textContent = 'Failed to load song list.';
        console.error(e);
    }
}

function renderSongs(list) {
    const container = document.getElementById('songs');
    container.innerHTML = '';

    if (list.length === 0) {
        container.innerHTML = '<div class="song">No songs found.</div>';
        return;
    }

    list.forEach(song => {
        const title = (song.title && song.title !== 'Unknown Title')
            ? song.title
            : titleFromFile(song.file);

        const card = document.createElement('div');
        card.className = 'song';
        card.innerHTML = `
            <h2>${escapeHtml(title)}</h2>
            <div class="meta">
                Artist: ${escapeHtml(song.artist || 'Unknown')}<br>
                Album: ${escapeHtml(song.album || 'Unknown')}<br>
                Duration: ${formatDuration(song.duration)}
            </div>
            <audio controls preload="none">
                <source src="${escapeHtml(song.file)}">
            </audio>
            <a class="download" href="${escapeHtml(song.file)}" download>Download</a>
        `;
        container.appendChild(card);
    });
}

function formatDuration(seconds) {
    seconds = parseInt(seconds);
    if (isNaN(seconds)) return 'Unknown';
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return mins + ':' + String(secs).padStart(2, '0');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

document.getElementById('search').addEventListener('input', function () {
    const q = this.value.toLowerCase();
    const filtered = allSongs.filter(song => {
        const title = (song.title && song.title !== 'Unknown Title')
            ? song.title
            : titleFromFile(song.file);
        return (
            title.toLowerCase().includes(q) ||
            (song.artist || '').toLowerCase().includes(q) ||
            (song.album || '').toLowerCase().includes(q)
        );
    });
    renderSongs(filtered);
});

loadSongs();
</script>

</body>
</html>
